server:
  port: 9093  # custom port for Payment Service

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/paymentsdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create       # Options: create, update, validate, none
      show-sql: true
      properties:
        hibernate:
          format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

# Optional message
msg: Welcome to Payment Service
