server:
  port: 9093

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/paymentsdb?useSSL=false&serverTimezone=UTC
    username: root
    password: your_mysql_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # create-drop / update / validate / none
      show-sql: true
      properties:
        hibernate:
          format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

# Optional message
msg: Welcome to Payment Service
